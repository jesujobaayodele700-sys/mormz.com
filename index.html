<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mormz — Premium Protection for the Modern Woman</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --ink:#0d0810;
  --cream:#f7f3ee;
  --violet:#7b4fa6;
  --deep:#3d1f6b;
  --lilac:#c8b4e8;
  --blush:#f2e8f7;
  --mint:#6ee7b7;
  --gold:#e8c87a;
  --warm:#e8ddd0;
  --mid:#7a6890;
  --border:rgba(123,79,166,0.14);
  --nav-h:68px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
  cursor:none;
}
/* custom cursor */
.cursor{
  position:fixed;width:10px;height:10px;
  background:var(--violet);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s,width 0.25s,height 0.25s,background 0.2s;
  mix-blend-mode:multiply;
}
.cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1px solid var(--violet);border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform 0.18s,width 0.3s,height 0.3s,opacity 0.3s;
  opacity:0.5;
}
.cursor.hover{width:22px;height:22px;background:var(--deep)}
.cursor-ring.hover{width:56px;height:56px;opacity:0.25}

/* typography */
.font-display{font-family:'Cormorant Garamond',serif}
.font-head{font-family:'Syne',sans-serif}

/* ─ KEYFRAMES ─ */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes floatPad{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-14px) rotate(-6deg)}}
@keyframes floatPadR{0%,100%{transform:translateY(0) rotate(4deg)}50%{transform:translateY(-10px) rotate(4deg)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes marqueeL{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes marqueeR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes underlineGrow{from{width:0}to{width:100%}}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.04);opacity:0.6}}
@keyframes countBounce{0%{transform:translateY(12px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes lineExpand{from{scaleX:0}to{scaleX:1}}

/* ─ REVEAL ─ */
.rv{opacity:0;transform:translateY(32px);transition:opacity 0.75s cubic-bezier(.16,1,.3,1),transform 0.75s cubic-bezier(.16,1,.3,1)}
.rv.vis{opacity:1;transform:none}
.rv-left{opacity:0;transform:translateX(-32px);transition:opacity 0.75s cubic-bezier(.16,1,.3,1),transform 0.75s cubic-bezier(.16,1,.3,1)}
.rv-left.vis{opacity:1;transform:none}
.rv-right{opacity:0;transform:translateX(32px);transition:opacity 0.75s cubic-bezier(.16,1,.3,1),transform 0.75s cubic-bezier(.16,1,.3,1)}
.rv-right.vis{opacity:1;transform:none}
.rv-scale{opacity:0;transform:scale(0.9);transition:opacity 0.8s cubic-bezier(.16,1,.3,1),transform 0.8s cubic-bezier(.16,1,.3,1)}
.rv-scale.vis{opacity:1;transform:none}

/* ─ NAV ─ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;
  transition:background 0.4s,box-shadow 0.4s;
}
nav.solid{
  background:rgba(247,243,238,0.94);
  backdrop-filter:blur(20px);
  box-shadow:0 1px 0 var(--border);
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:700;
  color:var(--deep);letter-spacing:2px;
  cursor:pointer;text-transform:uppercase;
}
.nav-logo span{color:var(--violet)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;
  color:var(--mid);letter-spacing:1px;text-transform:uppercase;
  text-decoration:none;
  position:relative;
  transition:color 0.2s;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-3px;left:0;
  height:1px;width:0;background:var(--violet);
  transition:width 0.3s;
}
.nav-links a:hover{color:var(--violet)}
.nav-links a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-cta{
  background:var(--ink);color:#fff;border:none;
  padding:9px 22px;border-radius:2px;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:background 0.2s,transform 0.15s;
}
.nav-cta:hover{background:var(--violet);transform:translateY(-1px)}
.hamburger{
  display:none;flex-direction:column;gap:5px;
  background:none;border:none;cursor:pointer;padding:4px;
}
.hamburger span{display:block;width:20px;height:1.5px;background:var(--ink);transition:all 0.3s}
.mobile-menu{
  display:none;position:fixed;
  top:var(--nav-h);left:0;right:0;bottom:0;
  background:var(--cream);z-index:490;
  flex-direction:column;align-items:center;justify-content:center;
  gap:36px;
}
.mobile-menu.open{display:flex}
.mobile-menu a{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:300;color:var(--ink);
  text-decoration:none;letter-spacing:1px;
  transition:color 0.2s;
}
.mobile-menu a:hover{color:var(--violet)}

/* ─ HERO — full-bleed diagonal split ─ */
#hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:55% 45%;
  position:relative;overflow:hidden;
}
.hero-left{
  background:var(--ink);
  position:relative;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:0 64px 80px 80px;
  padding-top:calc(var(--nav-h) + 48px);
  overflow:hidden;
  clip-path:polygon(0 0,100% 0,90% 100%,0 100%);
  z-index:2;
}
.hero-bg-txt{
  position:absolute;bottom:-20px;left:-10px;
  font-family:'Cormorant Garamond',serif;
  font-size:200px;font-weight:700;
  color:rgba(200,180,232,0.04);
  line-height:1;pointer-events:none;white-space:nowrap;
  letter-spacing:-8px;
}
.hero-eyebrow{
  font-family:'Syne',sans-serif;
  font-size:10px;letter-spacing:5px;
  color:var(--lilac);text-transform:uppercase;
  margin-bottom:28px;
  opacity:0;animation:fadeUp 0.7s 0.2s ease forwards;
}
.hero-h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(58px,6.5vw,96px);
  font-weight:300;color:#fff;
  line-height:0.95;letter-spacing:-2px;
  opacity:0;animation:fadeUp 0.9s 0.35s ease forwards;
}
.hero-h1 em{font-style:italic;color:var(--lilac)}
.hero-h1 strong{
  font-weight:700;
  display:block;
  -webkit-text-stroke:1px var(--lilac);
  color:transparent;
}
.hero-sub{
  font-size:14px;color:rgba(255,255,255,0.5);
  line-height:1.9;margin-top:32px;max-width:340px;
  opacity:0;animation:fadeUp 0.8s 0.5s ease forwards;
}
.hero-actions{
  display:flex;align-items:center;gap:20px;
  margin-top:44px;flex-wrap:wrap;
  opacity:0;animation:fadeUp 0.8s 0.65s ease forwards;
}
.btn-solid{
  background:var(--lilac);color:var(--deep);
  border:none;padding:14px 36px;
  font-family:'Syne',sans-serif;font-size:11px;
  font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;border-radius:2px;
  transition:background 0.2s,transform 0.15s;
}
.btn-solid:hover{background:#fff;transform:translateY(-2px)}
.btn-solid:active{transform:scale(0.97)}
.btn-line{
  font-family:'Syne',sans-serif;font-size:11px;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.5);background:none;border:none;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:color 0.2s;
}
.btn-line:hover{color:#fff}
.btn-line::after{content:'→';font-size:14px;transition:transform 0.2s}
.btn-line:hover::after{transform:translateX(4px)}
.hero-stats-row{
  display:flex;gap:48px;margin-top:56px;
  opacity:0;animation:fadeUp 0.8s 0.8s ease forwards;
  padding-top:32px;
  border-top:1px solid rgba(255,255,255,0.08);
}
.hero-stat-val{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:700;color:var(--lilac);
  line-height:1;
}
.hero-stat-lbl{
  font-size:10px;color:rgba(255,255,255,0.35);
  letter-spacing:2px;text-transform:uppercase;margin-top:4px;
}

.hero-right{
  background:var(--blush);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding-top:var(--nav-h);
}
.hero-right-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 70% 30%,rgba(123,79,166,0.08) 0%,transparent 50%),
    radial-gradient(circle at 20% 80%,rgba(200,180,232,0.12) 0%,transparent 50%);
}
.hero-pad-stage{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.pad-float-main{
  animation:floatPad 4.5s ease-in-out infinite;
  position:relative;
}
.pad-chip{
  position:absolute;
  background:var(--deep);color:#fff;
  font-family:'Syne',sans-serif;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  padding:6px 12px;border-radius:2px;white-space:nowrap;
  box-shadow:0 4px 16px rgba(61,31,107,0.25);
}
.hero-mini-pads{
  display:flex;gap:16px;align-items:flex-end;
}
.pad-mini{
  opacity:0.7;
}
.pad-mini:nth-child(1){animation:floatPad 5s 0.5s ease-in-out infinite;opacity:0.5}
.pad-mini:nth-child(2){animation:floatPadR 5.5s 1s ease-in-out infinite;opacity:0.4}

/* ─ MARQUEE DUAL ─ */
.marquee-block{background:var(--deep);padding:14px 0;overflow:hidden}
.marquee-row{display:flex;gap:0;white-space:nowrap}
.marquee-row.fwd{animation:marqueeL 24s linear infinite}
.marquee-row.rev{animation:marqueeR 28s linear infinite;margin-top:10px}
.marquee-item{
  display:inline-flex;align-items:center;gap:16px;
  padding:0 28px;
  font-family:'Syne',sans-serif;
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(200,180,232,0.55);
}
.mdot{width:4px;height:4px;border-radius:50%;background:var(--lilac);opacity:0.5;flex-shrink:0}

/* ─ FEATURES — editorial 3-up with oversized numbers ─ */
#features{
  padding:140px 0 0;
  background:var(--cream);
  overflow:hidden;
}
.features-top{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;align-items:end;
  padding:0 80px;margin-bottom:80px;
}
.features-intro{padding-right:80px}
.features-label{
  font-family:'Syne',sans-serif;font-size:10px;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--violet);margin-bottom:20px;display:block;
}
.features-h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(44px,4.5vw,68px);
  font-weight:300;line-height:1.05;color:var(--ink);
}
.features-h2 em{font-style:italic;color:var(--violet)}
.features-aside{
  padding-left:48px;
  border-left:1px solid var(--border);
}
.features-aside p{
  font-size:15px;color:var(--mid);line-height:1.8;
}
.features-strip{
  display:grid;grid-template-columns:repeat(6,1fr);
  border-top:1px solid var(--border);
  margin-top:0;
}
.feat-cell{
  padding:52px 36px;
  border-right:1px solid var(--border);
  position:relative;overflow:hidden;
  transition:background 0.3s;cursor:default;
}
.feat-cell:last-child{border-right:none}
.feat-cell:hover{background:var(--blush)}
.feat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:72px;font-weight:300;
  color:rgba(123,79,166,0.08);
  position:absolute;top:-8px;right:12px;
  line-height:1;pointer-events:none;
  transition:color 0.3s;
}
.feat-cell:hover .feat-n{color:rgba(123,79,166,0.15)}
.feat-ico{
  width:40px;height:40px;
  background:var(--deep);border-radius:1px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
}
.feat-ico svg{width:18px;height:18px;stroke:var(--lilac);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.feat-title{
  font-family:'Syne',sans-serif;
  font-size:13px;font-weight:700;
  color:var(--ink);margin-bottom:10px;letter-spacing:0.3px;
}
.feat-body{font-size:12px;color:var(--mid);line-height:1.7}

/* ─ PRODUCTS — staggered asymmetric ─ */
#products{
  background:var(--ink);
  padding:140px 80px;
  position:relative;overflow:hidden;
}
#products::before{
  content:'MORMZ';
  position:absolute;right:-40px;top:50%;
  transform:translateY(-50%) rotate(90deg);
  font-family:'Cormorant Garamond',serif;
  font-size:220px;font-weight:700;
  color:rgba(200,180,232,0.03);
  line-height:1;pointer-events:none;letter-spacing:-8px;
}
.products-header{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:80px;
}
.products-header-left{}
.prod-label{
  font-family:'Syne',sans-serif;font-size:10px;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--lilac);margin-bottom:20px;display:block;
}
.products-h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(44px,4.5vw,68px);
  font-weight:300;color:#fff;line-height:1.05;
}
.products-h2 em{font-style:italic;color:var(--lilac)}
.products-tagline{
  font-size:13px;color:rgba(255,255,255,0.35);
  max-width:260px;text-align:right;line-height:1.7;
}
/* horizontal scrolling product rail */
.products-rail{
  display:grid;grid-template-columns:1fr 1.15fr 1fr;
  gap:2px;
}
.prod-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(200,180,232,0.1);
  padding:48px 36px;
  display:flex;flex-direction:column;
  transition:background 0.3s,transform 0.3s;
  position:relative;overflow:hidden;
}
.prod-card:hover{
  background:rgba(200,180,232,0.06);
  transform:translateY(-4px);
}
.prod-card.featured-prod{
  background:rgba(200,180,232,0.07);
  border-color:rgba(200,180,232,0.25);
  margin-top:-20px;margin-bottom:-20px;
}
.prod-card-label{
  font-family:'Syne',sans-serif;font-size:9px;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--lilac);margin-bottom:32px;
  display:flex;align-items:center;gap:10px;
}
.prod-card-label::after{content:'';flex:1;height:1px;background:rgba(200,180,232,0.15)}
.featured-badge{
  background:var(--lilac);color:var(--deep);
  font-family:'Syne',sans-serif;font-size:8px;
  letter-spacing:2px;text-transform:uppercase;
  padding:3px 10px;border-radius:1px;
}
.prod-visual{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 0;
}
.prod-name-big{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:600;color:#fff;
  margin-bottom:8px;letter-spacing:-0.5px;
}
.prod-sub{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:24px}
.prod-price-row{
  display:flex;align-items:baseline;gap:8px;
  margin-bottom:28px;
}
.prod-price-val{
  font-family:'Cormorant Garamond',serif;
  font-size:40px;font-weight:600;color:var(--lilac);line-height:1;
}
.prod-price-per{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.5px}
.prod-features-mini{
  list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:32px;
}
.prod-features-mini li{
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:rgba(255,255,255,0.5);
}
.prod-features-mini li::before{
  content:'';width:4px;height:4px;border-radius:50%;
  background:var(--mint);flex-shrink:0;
}
.prod-cta{
  margin-top:auto;width:100%;
  padding:14px;font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  background:transparent;color:var(--lilac);
  border:1px solid rgba(200,180,232,0.25);
  cursor:pointer;border-radius:1px;
  transition:all 0.2s;
}
.prod-cta:hover{background:var(--lilac);color:var(--deep);border-color:var(--lilac)}
.prod-card.featured-prod .prod-cta{background:var(--lilac);color:var(--deep);border-color:var(--lilac)}
.prod-card.featured-prod .prod-cta:hover{background:#fff;border-color:#fff}

/* ─ STATS — full-bleed editorial ─ */
#stats{
  background:var(--blush);
  overflow:hidden;
  position:relative;
}
.stats-inner{
  display:grid;grid-template-columns:1fr 1fr;
  min-height:560px;
}
.stats-copy-side{
  background:var(--deep);
  padding:100px 80px;
  display:flex;flex-direction:column;justify-content:center;
  clip-path:polygon(0 0,100% 0,88% 100%,0 100%);
  position:relative;z-index:1;
}
.stats-copy-side .features-label{color:var(--lilac)}
.stats-h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,4vw,60px);font-weight:300;
  color:#fff;line-height:1.1;margin-bottom:28px;
}
.stats-h2 em{font-style:italic;color:var(--lilac)}
.stats-body{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.8;max-width:340px}
.stats-numbers{
  padding:80px;
  display:grid;grid-template-columns:1fr 1fr;
  align-content:center;gap:0;
}
.stat-item{
  padding:44px 36px;
  border:1px solid var(--border);
  margin:-1px 0 0 -1px;
  transition:background 0.3s;
}
.stat-item:hover{background:rgba(123,79,166,0.04)}
.stat-val{
  font-family:'Cormorant Garamond',serif;
  font-size:64px;font-weight:300;
  color:var(--deep);line-height:1;
}
.stat-val span{font-size:32px;color:var(--violet)}
.stat-desc{font-size:12px;color:var(--mid);margin-top:8px;line-height:1.6;letter-spacing:0.3px}

/* ─ TECHNOLOGY — full magazine spread ─ */
#technology{
  padding:140px 80px;
  background:var(--cream);
  position:relative;overflow:hidden;
}
#technology::after{
  content:'';position:absolute;
  bottom:-200px;right:-200px;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,180,232,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.tech-head{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:96px;
}
.tech-h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(44px,4.5vw,68px);
  font-weight:300;line-height:1.05;color:var(--ink);
}
.tech-h2 em{font-style:italic;color:var(--violet)}
.tech-intro-p{
  max-width:320px;font-size:14px;color:var(--mid);line-height:1.8;
  text-align:right;
}
.tech-layout{
  display:grid;grid-template-columns:1fr 1fr;
  gap:100px;align-items:center;
}
.tech-orb-wrap{
  position:relative;height:420px;
  display:flex;align-items:center;justify-content:center;
}
.tech-orb{
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,var(--blush),rgba(200,180,232,0.3));
  border:1px solid var(--border);

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ─ cursor ─ */
function CustomCursor(){
  const c=useRef(null),r=useRef(null);
  useEffect(()=>{
    const move=e=>{
      if(c.current){c.current.style.left=e.clientX+'px';c.current.style.top=e.clientY+'px'}
      if(r.current){r.current.style.left=e.clientX+'px';r.current.style.top=e.clientY+'px'}
    };
    const over=e=>{
      if(e.target.closest('button,a,[data-hover]')){
        c.current&&c.current.classList.add('hover');
        r.current&&r.current.classList.add('hover');
      }else{
        c.current&&c.current.classList.remove('hover');
        r.current&&r.current.classList.remove('hover');
      }
    };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseover',over);
    return()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseover',over)};
  },[]);
  return(<><div ref={c} className="cursor"/><div ref={r} className="cursor-ring"/></>);
}

/* ─ reveal hook ─ */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.rv,.rv-left,.rv-right,.rv-scale');
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}});
    },{threshold:0.08});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  });
}

/* ─ pad SVG ─ */
const PadSVG=({w=80,h=112,body='#c4b5fd',strip='#10b981',wing='#a78bfa'})=>(
  <svg viewBox="0 0 80 112" width={w} height={h}>
    <defs>
      <linearGradient id={`b${body.replace(/[^a-z0-9]/gi,'')}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={body} stopOpacity="1"/>
        <stop offset="100%" stopColor={body} stopOpacity="0.75"/>
      </linearGradient>
    </defs>
    <rect x="7" y="4" width="66" height="98" rx="33" fill={`url(#b${body.replace(/[^a-z0-9]/gi,'')})`}/>
    <rect x="27" y="16" width="26" height="64" rx="13" fill={strip} opacity="0.88"/>
    <rect x="0" y="74" width="80" height="22" rx="10" fill={wing} opacity="0.8"/>
    <rect x="14" y="10" width="8" height="28" rx="4" fill="white" opacity="0.2" transform="rotate(-10 18 24)"/>
  </svg>
);

/* ─ campaign slideshow ─ */
const Slideshow=()=>{
  const[cur,setCur]=useState(0);
  const[pct,setPct]=useState(0);
  const[playing,setPlaying]=useState(true);
  const rafRef=useRef();const startRef=useRef();const DUR=4200;
  const total=5;
  const goto=useCallback((n,resetPlay)=>{
    setCur(((n%total)+total)%total);setPct(0);startRef.current=null;
    if(resetPlay!==false)setPlaying(true);
  },[]);
  useEffect(()=>{
    if(!playing)return;
    const tick=ts=>{
      if(!startRef.current)startRef.current=ts;
      const p=Math.min((ts-startRef.current)/DUR,1)*100;
      setPct(p);
      if(p>=100){goto(cur+1);return;}
      rafRef.current=requestAnimationFrame(tick);
    };
